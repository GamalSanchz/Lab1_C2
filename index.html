<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Inventario Escolar</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #eef2f7;
    min-height: 100vh;
    padding: 2rem;
  }

  #app {
    max-width: 700px;
    margin: 0 auto;
    background: white;
    border-radius: 14px;
    padding: 2rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  h1 {
    font-size: 1.8rem;
    color: #1a73e8;
    border-bottom: 3px solid #1a73e8;
    padding-bottom: 0.5rem;
    margin-bottom: 1.5rem;
  }

  h2 {
    font-size: 1.2rem;
    color: #2c3e50;
    margin: 1.5rem 0 1rem;
  }

  form {
    background: #f8faff;
    border: 1px solid #e0eaff;
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-weight: 600;
    color: #444;
    margin-top: 0.8rem;
    margin-bottom: 0.3rem;
  }

  input[type="text"],
  input[type="number"] {
    width: 100%;
    padding: 0.55rem 0.9rem;
    border: 1.5px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    outline: none;
    border-color: #1a73e8;
    box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
  }

  button[type="submit"] {
    margin-top: 1.2rem;
    background-color: #1a73e8;
    color: white;
    border: none;
    padding: 0.65rem 2rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  button[type="submit"]:hover {
    background-color: #1558b0;
  }

  .error {
    color: #e53935;
    font-size: 0.82rem;
    display: block;
    margin-top: 0.2rem;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 0.5rem;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  thead {
    background-color: #1a73e8;
    color: white;
  }

  th, td {
    border: none;
    padding: 0.75rem 1rem;
    text-align: left;
    border-bottom: 1px solid #eee;
  }

  tbody tr:hover {
    background-color: #f0f7ff;
  }

  tbody tr td:last-child button {
    background-color: #e53935;
    color: white;
    border: none;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background-color 0.2s;
  }

  tbody tr td:last-child button:hover {
    background-color: #b71c1c;
  }

  p {
    color: #999;
    font-style: italic;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
  <div id="app">
    <h1>Inventario Escolar</h1>

    <!-- Formulario de ingreso -->
    <form @submit.prevent="agregarMaterial">
      <label>Nombre del material:</label>
      <input type="text" v-model="nuevoNombre" />
      <span class="error" v-if="errores.nombre">{{ errores.nombre }}</span><br>

      <label>Categoría:</label>
      <input type="text" v-model="nuevaCategoria" />
      <span class="error" v-if="errores.categoria">{{ errores.categoria }}</span><br>

      <label>Cantidad:</label>
      <input type="number" v-model="nuevaCantidad" />
      <span class="error" v-if="errores.cantidad">{{ errores.cantidad }}</span><br>

      <button type="submit">Agregar</button>
    </form>

    <!-- Lista de materiales -->
    <h2>Materiales registrados</h2>
    <table v-if="inventario.length > 0">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Cantidad</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr v-for="(item, index) in inventario" :key="index">
          <td>{{ item.nombre }}</td>
          <td>{{ item.categoria }}</td>
          <td>{{ item.cantidad }}</td>
          <td>
            <button @click="eliminarMaterial(index)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
    <p v-if="inventario.length === 0">No hay materiales registrados.</p>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          // Variables reactivas
          nuevoNombre: "",
          nuevaCategoria: "",
          nuevaCantidad: "",
          inventario: [],
          errores: { nombre: "", categoria: "", cantidad: "" }
        };
      },
      methods: {
        validarCampos() {
          this.errores = { nombre: "", categoria: "", cantidad: "" };
          let valido = true;

          if (!this.nuevoNombre.trim()) {
            this.errores.nombre = "El nombre es obligatorio.";
            valido = false;
          }
          if (!this.nuevaCategoria.trim()) {
            this.errores.categoria = "La categoría es obligatoria.";
            valido = false;
          }
          if (!this.nuevaCantidad || this.nuevaCantidad <= 0) {
            this.errores.cantidad = "La cantidad debe ser mayor a 0.";
            valido = false;
          }
          return valido;
        },
        agregarMaterial() {
          if (this.validarCampos()) {
            this.inventario.push({
              nombre: this.nuevoNombre,
              categoria: this.nuevaCategoria,
              cantidad: this.nuevaCantidad
            });
            // Limpiar inputs
            this.nuevoNombre = "";
            this.nuevaCategoria = "";
            this.nuevaCantidad = "";
          }
        },
        eliminarMaterial(index) {
          this.inventario.splice(index, 1);
        }
      }
    }).mount("#app");
  </script>
</body>
</html>
